services:
  # 1. Database Service (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: ${ENV_NAME}_postgres
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smte_admin -d smte_bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Message Broker Service (Redis)
  redis:
    image: redis:7-alpine
    container_name: ${ENV_NAME}_redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # 3. Backend Service (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${ENV_NAME}_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "${API_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # 4. Discord Bot Service
  bot_discord:
    build:
      context: ./bot_discord
      dockerfile: Dockerfile
    container_name: ${ENV_NAME}_discord_bot
    restart: always
    env_file:
      - ./bot_discord/.env
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  # 5. Frontend Service (Vue/Vite TypeScript)
  frontend_ts:
    build:
      context: ./frontend_ts 
      dockerfile: Dockerfile
    container_name: ${ENV_NAME}_frontend_ts
    restart: always
    ports:
      - "${WEB_PORT}:80"
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge